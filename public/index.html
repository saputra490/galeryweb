<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login -GaleryWeb</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Latar belakang diwarnai hitam pekat menyamai tema web */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kotak pengisian warna putih bersih dan minimalis */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        .login-card h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            color: #000000;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #666666;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background-color: #ffffff;
            color: #000000;
            outline: none;
        }

        .input-group input:focus {
            border-color: #000000;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #1a1a1a;
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
        }

        .footer-links a {
            color: #000000;
            text-decoration: none;
            font-weight: 600;
        }
        
        .btn-lupa {
            color: #e53e3e !important;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Masuk ke Akun</h2>
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="footer-links">
            <a href="#" class="btn-lupa">Lupa Kata Sandi?</a>
            <span style="color: #666666;">Buat Akun</span> <a href="/register.html">Daftar di sini</a>
        </div>
    </div>

</body>
</html>
